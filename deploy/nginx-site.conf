##############################################################################
# 求职助手 — Nginx 反向代理配置
#
# 部署路径：/etc/nginx/conf.d/job-assistant.conf
# 启用命令：sudo cp deploy/nginx-site.conf /etc/nginx/conf.d/job-assistant.conf
#           sudo nginx -t && sudo systemctl reload nginx
#
##############################################################################

server {
    listen 80 default_server;
    server_name _;          # 替换为你的域名或公网 IP

    # ── 文件上传大小（简历 docx，给足空间）──────────────────────────────────────
    client_max_body_size 30M;

    # ── 搜索/AI 任务可能跑数分钟，超时要给够 ───────────────────────────────────
    proxy_read_timeout    600s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;

    # ── 任务状态轮询不缓冲，确保进度实时返回 ───────────────────────────────────
    proxy_buffering    off;
    proxy_cache        off;

    # ── 根路径禁止访问，必须带业务前缀 ───────────────────────────────────────────
    location = / {
        return 404;
    }

    # 统一代理配置：/job-application/* -> /*
    location = /job-application {
        return 301 /job-application/;
    }

    location /job-application/ {
        rewrite ^/job-application/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留，当前未使用）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # 统一代理配置：/job-assistant/* -> /*
    location = /job-assistant {
        return 301 /job-assistant/;
    }

    location /job-assistant/ {
        rewrite ^/job-assistant/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留，当前未使用）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # 其他无前缀路径不对外暴露
    location / {
        return 404;
    }
}
