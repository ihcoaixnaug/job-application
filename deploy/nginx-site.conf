##############################################################################
# 求职助手 — Nginx 反向代理配置
#
# 部署路径：/etc/nginx/sites-available/job-assistant
# 启用命令：sudo ln -s /etc/nginx/sites-available/job-assistant \
#                       /etc/nginx/sites-enabled/job-assistant
#           sudo nginx -t && sudo systemctl reload nginx
#
##############################################################################

server {
    listen 80;
    server_name _;          # 替换为你的域名或公网 IP

    # ── 文件上传大小（简历 docx，给足空间）──────────────────────────────────────
    client_max_body_size 30M;

    # ── 搜索/AI 任务可能跑数分钟，超时要给够 ───────────────────────────────────
    proxy_read_timeout    600s;
    proxy_connect_timeout  60s;
    proxy_send_timeout    600s;

    # ── 任务状态轮询不缓冲，确保进度实时返回 ───────────────────────────────────
    proxy_buffering    off;
    proxy_cache        off;

    # ── 转发到 uvicorn ──────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket 支持（预留，当前未使用）
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
